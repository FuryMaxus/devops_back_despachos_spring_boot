name: CI/CD Backend despacho

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v3

      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: back_despacho
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en EC2
        uses: appleboy/ssh-action@master
        env:
          REGISTRY: ${{ needs.build-and-push.outputs.registry }}
          REPO: back_despacho
          TAG: latest
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY,REPO,TAG,DB_NAME,DB_USER,DB_PASSWORD
          script: |
            echo "1. Autenticando en Amazon ECR..."
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REGISTRY
            docker pull $REGISTRY/$REPO:$TAG
            
            echo "2. Creando red interna de Docker..."
            docker network create despacho-net || true
            
            echo "3. Levantando Base de Datos (con persistencia)..."
            if [ ! "$(docker ps -a -q -f name=mysql-db)" ]; then
              docker run -d --name mysql-db \
                --network despacho-net \
                -p 3306:3306 \
                -e MYSQL_DATABASE=$DB_NAME \
                -e MYSQL_USER=$DB_USER \
                -e MYSQL_PASSWORD=$DB_PASSWORD \
                -e MYSQL_ROOT_PASSWORD=$DB_PASSWORD \
                -v mysql_data_prod:/var/lib/mysql \
                mysql:8.0
            fi
            
            echo "4. Actualizando el Backend..."
            docker stop backend-despacho || true
            docker rm backend-despacho || true
            
            docker run -d --name backend-despacho \
              --network despacho-net \
              -p 8081:8081 \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/$DB_NAME?useSSL=false\&serverTimezone=UTC\&allowPublicKeyRetrieval=true \
              -e SPRING_DATASOURCE_USERNAME=$DB_USER \
              -e SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD \
              $REGISTRY/$REPO:$TAG
            
            echo "5. Limpiando caché..."
            docker image prune -f
